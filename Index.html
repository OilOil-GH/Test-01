<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗺️ Company Trip Vote!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--sky:#e0f2fe;--ink:#1e293b;--muted:#64748b;--white:#ffffff;--radius:1.2rem;--shadow:0 4px 24px rgba(0,0,0,.10)}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#e0f2fe 0%,#f0fdf4 40%,#fdf4ff 100%);min-height:100vh;color:var(--ink);overflow-x:hidden}

/* bg */
.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35}
.orb1{width:420px;height:420px;background:radial-gradient(circle,#bae6fd,#818cf8);top:-120px;left:-100px;animation:orbDrift1 18s ease-in-out infinite}
.orb2{width:360px;height:360px;background:radial-gradient(circle,#fde68a,#fb7185);bottom:-80px;right:-80px;animation:orbDrift2 22s ease-in-out infinite}
.orb3{width:260px;height:260px;background:radial-gradient(circle,#bbf7d0,#34d399);top:40%;left:60%;animation:orbDrift3 16s ease-in-out infinite}
.float-emoji{position:absolute;font-size:1.8rem;animation:floatUp 14s linear infinite;opacity:.55;user-select:none}
@keyframes orbDrift1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
@keyframes orbDrift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px)}}
@keyframes orbDrift3{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-25px)}}
@keyframes floatUp{0%{transform:translateY(110vh) rotate(0deg);opacity:0}10%{opacity:.55}90%{opacity:.55}100%{transform:translateY(-10vh) rotate(360deg);opacity:0}}

/* layout */
.page{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.2rem 4rem}

/* hero */
.hero{text-align:center;margin-bottom:2.4rem}
.hero-badge{display:inline-flex;align-items:center;gap:.5rem;background:white;border-radius:2rem;padding:.4rem 1.1rem;font-size:.82rem;font-weight:700;color:#0284c7;box-shadow:0 2px 12px rgba(2,132,199,.18);margin-bottom:1rem}
.hero h1{font-size:clamp(2rem,5vw,3rem);font-weight:900;line-height:1.1;background:linear-gradient(135deg,#0284c7,#7c3aed,#db2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.6rem}
.hero p{color:var(--muted);font-size:1.05rem;font-weight:600}

/* form */
.form-card{background:white;border-radius:var(--radius);padding:1.8rem 2rem;box-shadow:var(--shadow);margin-bottom:2rem}
.form-card h2{font-size:1.1rem;font-weight:800;margin-bottom:1.2rem;color:var(--ink);display:flex;align-items:center;gap:.5rem}
.field-row{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
.field-row:last-child{margin-bottom:0}
.field-label{display:flex;align-items:center;gap:.5rem;font-size:.88rem;font-weight:700;color:#475569}
.field-input,.field-select{width:100%;padding:.7rem 1rem;border:2px solid #e2e8f0;border-radius:.8rem;font-family:inherit;font-size:.95rem;font-weight:600;color:var(--ink);background:white;transition:border-color .2s,box-shadow .2s;outline:none}
.field-input:focus,.field-select:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.15)}

/* section title */
.section-title{font-size:1.05rem;font-weight:800;color:var(--ink);margin-bottom:1.2rem;display:flex;align-items:center;gap:.5rem}

/* cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1rem;margin-bottom:0}
.vote-card{position:relative;background:white;border-radius:1.1rem;padding:1.4rem .8rem 1rem;text-align:center;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .22s;border:2.5px solid #e2e8f0;box-shadow:0 2px 12px rgba(0,0,0,.07);user-select:none;transform-style:preserve-3d}
.vote-card:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 12px 32px rgba(0,0,0,.13)}
.vote-card.selected{border-color:var(--card-color,#818cf8);box-shadow:0 0 0 4px color-mix(in srgb,var(--card-color,#818cf8) 18%,transparent),0 8px 28px rgba(0,0,0,.12)}
.card-badge{position:absolute;top:.5rem;left:.5rem;min-width:1.5rem;height:1.5rem;padding:0 .4rem;border-radius:2rem;background:var(--card-color,#818cf8);color:white;font-size:.72rem;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.card-badge.pop{animation:badgePop .35s cubic-bezier(.34,1.6,.64,1)}
@keyframes badgePop{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
.card-icon{width:72px;height:72px;margin:0 auto .7rem;display:flex;align-items:center;justify-content:center}
.card-icon svg{overflow:visible}
.card-label{font-size:.9rem;font-weight:800;color:var(--ink)}
.card-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.55);transform:scale(0);animation:rippleOut .55s ease-out forwards;pointer-events:none}
@keyframes rippleOut{to{transform:scale(4);opacity:0}}

/* transport anim */
@keyframes planeFloat{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-8px) rotate(3deg)}}
@keyframes trainChug{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
@keyframes busBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes carSway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
@keyframes ferryRock{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-4px)}}
@keyframes wheelSpin{to{transform:rotate(360deg)}}
@keyframes smokePuff{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.3) translateY(-4px);opacity:.3}}
@keyframes eyeBlink{0%,90%,100%{transform:scaleY(1)}93%,97%{transform:scaleY(0.1)}}
@keyframes waveShift{0%,100%{transform:translateX(0)}50%{transform:translateX(-6px)}}
.vote-card[data-option="airplane"] .card-icon svg{animation:planeFloat 3.5s ease-in-out infinite}
.vote-card[data-option="train"]    .card-icon svg{animation:trainChug .45s ease-in-out infinite}
.vote-card[data-option="bus"]      .card-icon svg{animation:busBounce 2.2s ease-in-out infinite}
.vote-card[data-option="car"]      .card-icon svg{animation:carSway 2.8s ease-in-out infinite}
.vote-card[data-option="ferry"]    .card-icon svg{animation:ferryRock 3.2s ease-in-out infinite}
.wheel-spin{transform-box:fill-box;transform-origin:center;animation:wheelSpin 1.6s linear infinite}
.eye-blink{transform-box:fill-box;transform-origin:center;animation:eyeBlink 5s ease-in-out infinite}
.eye-blink-2{transform-box:fill-box;transform-origin:center;animation:eyeBlink 5s ease-in-out infinite 2.5s}
.smoke-1{transform-box:fill-box;transform-origin:center;animation:smokePuff 2s ease-in-out infinite}
.smoke-2{transform-box:fill-box;transform-origin:center;animation:smokePuff 2s ease-in-out infinite .7s}
.wave-anim{animation:waveShift 3s ease-in-out infinite}

/* reason */
.reason-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .52s cubic-bezier(.34,1.2,.64,1);margin-top:0;margin-bottom:0}
.reason-wrap.open{grid-template-rows:1fr;margin-top:1rem;margin-bottom:1.4rem}
.reason-slide{overflow:hidden}
.reason-inner{background:white;border-radius:1.1rem;padding:1.2rem 1.4rem;border:2.5px solid #e2e8f0;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.reason-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem}
.reason-header-text{font-size:.95rem;font-weight:800;color:var(--ink)}
.reason-header-sub{font-size:.78rem;color:var(--muted);font-weight:600}
.reason-textarea{width:100%;min-height:90px;padding:.75rem 1rem;border:2px solid #e2e8f0;border-radius:.8rem;font-family:inherit;font-size:.9rem;font-weight:600;color:var(--ink);resize:vertical;outline:none;transition:border-color .2s,box-shadow .2s;background:#fafafa}
.reason-textarea:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.15);background:white}

/* vote btn */
.vote-btn-wrap{display:flex;justify-content:center;margin:1.6rem 0 2rem;position:relative}
.vote-btn-halo{position:absolute;inset:-10px;border-radius:3rem;background:conic-gradient(from var(--a,0deg),#f472b6,#818cf8,#34d399,#fbbf24,#f472b6);filter:blur(14px);opacity:.55;animation:haloSpin 3s linear infinite;--a:0deg}
@keyframes haloSpin{to{--a:360deg}}
@property --a{syntax:'<angle>';initial-value:0deg;inherits:false}
.vote-btn{position:relative;padding:1.1rem 3.2rem;border:none;border-radius:2.5rem;cursor:pointer;font-family:inherit;font-size:1.2rem;font-weight:900;color:white;background:linear-gradient(135deg,#7c3aed,#0284c7,#db2777);background-size:200% 200%;animation:btnShimmer 4s ease infinite;box-shadow:0 6px 30px rgba(124,58,237,.4);transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:.6rem;overflow:hidden}
.vote-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 10px 40px rgba(124,58,237,.5)}
.vote-btn:active{transform:scale(.97)}
@keyframes btnShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-sparkle{position:absolute;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.9);animation:sparklePop 2s ease-in-out infinite}
.btn-sparkle:nth-child(1){top:20%;left:10%;animation-delay:0s}
.btn-sparkle:nth-child(2){top:70%;left:80%;animation-delay:.7s}
.btn-sparkle:nth-child(3){top:40%;left:50%;animation-delay:1.3s}
@keyframes sparklePop{0%,100%{transform:scale(0);opacity:0}50%{transform:scale(1);opacity:1}}

/* results */
.results-card{background:white;border-radius:var(--radius);padding:1.8rem 2rem;box-shadow:var(--shadow);margin-bottom:1.5rem}
.results-card h2{font-size:1.1rem;font-weight:800;margin-bottom:1.4rem;display:flex;align-items:center;gap:.5rem}
.result-row{margin-bottom:1.1rem}
.result-top{display:flex;align-items:center;gap:.7rem;margin-bottom:.4rem}
.result-icon{flex-shrink:0}
.result-label{font-size:.92rem;font-weight:800;flex:1}
.result-count{font-size:.82rem;font-weight:700;color:var(--muted)}
.result-bar-bg{height:10px;background:#f1f5f9;border-radius:5px;overflow:hidden}
.result-bar-fill{height:100%;border-radius:5px;transition:width .7s cubic-bezier(.34,1.2,.64,1)}
.comments-toggle{margin-top:.4rem;background:none;border:none;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;color:#818cf8;padding:.2rem 0;display:flex;align-items:center;gap:.3rem;transition:color .15s}
.comments-toggle:hover{color:#7c3aed}
.comments-panel{display:grid;grid-template-rows:0fr;transition:grid-template-rows .42s}
.comments-panel.open{grid-template-rows:1fr}
.comments-inner{overflow:hidden}
.comment-item{background:#f8fafc;border-radius:.7rem;padding:.6rem .85rem;margin-top:.4rem;font-size:.82rem;color:var(--ink);border-left:3px solid #e2e8f0}
.comment-item strong{font-weight:800;color:#475569}
.comment-dept{font-size:.72rem;color:var(--muted);font-weight:600}

/* ── VOTER FEED ── */
.voters-card{background:white;border-radius:var(--radius);padding:1.8rem 2rem;box-shadow:var(--shadow)}
.voters-card h2{font-size:1.1rem;font-weight:800;margin-bottom:.3rem;display:flex;align-items:center;gap:.5rem}
.voters-subtitle{font-size:.82rem;color:var(--muted);font-weight:600;margin-bottom:1.2rem}
.voters-empty{text-align:center;padding:2rem 0;color:var(--muted);font-size:.92rem;font-weight:600}
.voters-empty span{display:block;font-size:2rem;margin-bottom:.5rem}
.voter-item{
  display:flex;align-items:center;gap:.9rem;padding:.75rem 1rem;
  border-radius:.9rem;margin-bottom:.55rem;border:2px solid transparent;
  transition:transform .2s,box-shadow .2s;
  animation:voteSlideIn .5s cubic-bezier(.34,1.2,.64,1) both;
}
.voter-item:hover{transform:translateX(4px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
@keyframes voteSlideIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.voter-avatar{
  width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;font-weight:900;flex-shrink:0;border:2px solid rgba(0,0,0,.06);
}
.voter-info{flex:1;min-width:0}
.voter-name{font-size:.9rem;font-weight:800;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.voter-dept{font-size:.75rem;color:var(--muted);font-weight:600}
.voter-choice{display:flex;align-items:center;gap:.4rem;flex-shrink:0}
.voter-choice-label{font-size:.78rem;font-weight:800;padding:.25rem .65rem;border-radius:2rem;white-space:nowrap}
.voter-reason-btn{background:none;border:none;cursor:pointer;font-size:.75rem;font-weight:700;color:#818cf8;padding:.15rem .5rem;border-radius:1rem;transition:background .15s;white-space:nowrap}
.voter-reason-btn:hover{background:#ede9fe}
.voter-time{font-size:.7rem;color:#cbd5e1;font-weight:600;flex-shrink:0}
.voter-reason-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s}
.voter-reason-wrap.open{grid-template-rows:1fr}
.voter-reason-inner{overflow:hidden}
.voter-reason-text{margin-top:.4rem;padding:.5rem .75rem;background:#f8fafc;border-radius:.6rem;font-size:.8rem;color:#475569;font-weight:600;font-style:italic;border-left:3px solid #c4b5fd}

/* new-vote pulse ring */
.voter-item.new-vote{animation:voteSlideIn .5s cubic-bezier(.34,1.2,.64,1) both,newVotePulse 1s ease-out .5s}
@keyframes newVotePulse{0%{box-shadow:0 0 0 0 rgba(129,140,248,.5)}100%{box-shadow:0 0 0 12px rgba(129,140,248,0)}}

/* total badge */
.total-badge{display:inline-flex;align-items:center;gap:.35rem;background:linear-gradient(135deg,#7c3aed,#0284c7);color:white;border-radius:2rem;padding:.25rem .85rem;font-size:.78rem;font-weight:800;margin-left:.5rem;vertical-align:middle}

/* celebrate */
.confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:999}
.emoji-burst{position:fixed;z-index:1000;pointer-events:none;font-size:2rem;animation:emojiBurst .9s ease-out forwards}
@keyframes emojiBurst{0%{transform:translate(-50%,-50%) scale(0);opacity:1}100%{transform:translate(-50%,-200%) scale(1.2);opacity:0}}
.flash-overlay{position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:998;pointer-events:none;animation:flashFade .6s ease-out forwards}
@keyframes flashFade{0%{opacity:1}100%{opacity:0}}

/* toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:#1e293b;color:white;padding:.75rem 1.6rem;border-radius:2rem;font-size:.9rem;font-weight:700;z-index:1001;transition:transform .4s cubic-bezier(.34,1.2,.64,1);box-shadow:0 6px 24px rgba(0,0,0,.22);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:520px){
  .cards-grid{grid-template-columns:repeat(2,1fr)}
  .form-card,.results-card,.voters-card{padding:1.2rem}
  .voter-item{flex-wrap:wrap;gap:.5rem}
}
</style>
</head>
<body>
<div class="bg-layer">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<canvas class="confetti-canvas" id="confettiCanvas"></canvas>
<div class="toast" id="toast"></div>

<div class="page">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-badge">🗺️ Company Trip 2025</div>
    <h1>How Should We Travel?</h1>
    <p>Cast your vote &amp; help us plan the perfect trip together! ✨</p>
  </div>

  <!-- Form -->
  <div class="form-card">
    <h2>👋 Tell us who you are</h2>
    <div class="field-row">
      <label class="field-label">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="15" cy="15" r="14" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
          <circle cx="15" cy="11" r="5" fill="#8b5cf6"/>
          <ellipse cx="11" cy="10.5" rx="1" ry="1.3" fill="white"/><ellipse cx="19" cy="10.5" rx="1" ry="1.3" fill="white"/>
          <circle cx="11" cy="10.5" r=".55" fill="#4c1d95"/><circle cx="19" cy="10.5" r=".55" fill="#4c1d95"/>
          <path d="M13 13 Q15 14.5 17 13" stroke="white" stroke-width="1.1" stroke-linecap="round" fill="none"/>
          <circle cx="12.5" cy="12.5" r=".7" fill="#c4b5fd" opacity=".7"/><circle cx="17.5" cy="12.5" r=".7" fill="#c4b5fd" opacity=".7"/>
          <path d="M7 26 Q7 20 15 20 Q23 20 23 26" fill="#a78bfa"/>
        </svg>
        Your Name
      </label>
      <input class="field-input" id="voterName" type="text" placeholder="e.g. Alex Johnson" autocomplete="off"/>
    </div>
    <div class="field-row">
      <label class="field-label">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="15" cy="15" r="14" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
          <polygon points="8,14 15,7 22,14" fill="#f59e0b"/>
          <rect x="8" y="14" width="14" height="11" rx="1" fill="#fde68a" stroke="#d97706" stroke-width="1"/>
          <rect x="13" y="19" width="4" height="6" rx=".7" fill="#d97706"/>
          <rect x="10" y="16" width="3" height="2.5" rx=".5" fill="#fff" stroke="#d97706" stroke-width=".8"/>
          <rect x="17" y="16" width="3" height="2.5" rx=".5" fill="#fff" stroke="#d97706" stroke-width=".8"/>
          <circle cx="10.5" cy="16.5" r=".45" fill="#92400e"/><circle cx="13" cy="16.5" r=".45" fill="#92400e"/>
          <circle cx="17.5" cy="16.5" r=".45" fill="#92400e"/><circle cx="19.5" cy="16.5" r=".45" fill="#92400e"/>
          <path d="M12 21.5 Q15 23 18 21.5" stroke="#d97706" stroke-width=".9" stroke-linecap="round" fill="none"/>
        </svg>
        Department
      </label>
      <select class="field-select" id="voterDept">
        <option value="">— Select your department —</option>
        <option>Engineering</option><option>Product</option><option>Design</option>
        <option>Marketing</option><option>Sales</option><option>Finance</option>
        <option>HR / People</option><option>Operations</option><option>Legal</option>
        <option>Customer Success</option><option>Data &amp; Analytics</option><option>Executive / C-Suite</option>
      </select>
    </div>
  </div>

  <!-- Cards -->
  <div class="section-title">🚀 Choose your preferred transport</div>
  <div class="cards-grid" id="cardsGrid"></div>

  <!-- Reason -->
  <div class="reason-wrap" id="reasonWrap">
    <div class="reason-slide">
      <div class="reason-inner" id="reasonInner">
        <div class="reason-header">
          <div id="reasonIcon"></div>
          <div>
            <div class="reason-header-text">Why <span id="reasonLabel" style="color:#0284c7">this pick</span>? 💬</div>
            <div class="reason-header-sub">Optional — share your thoughts</div>
          </div>
        </div>
        <textarea class="reason-textarea" id="reasonText" placeholder="e.g. It's the fastest and most comfortable option for our team!"></textarea>
      </div>
    </div>
  </div>

  <!-- Vote btn -->
  <div class="vote-btn-wrap">
    <div class="vote-btn-halo"></div>
    <button class="vote-btn" id="voteBtn" onclick="castVote()">
      <div class="btn-sparkle"></div><div class="btn-sparkle"></div><div class="btn-sparkle"></div>
      🚀 Cast My Vote!
    </button>
  </div>

  <!-- Results chart -->
  <div class="results-card">
    <h2>📊 Live Results <span class="total-badge" id="totalBadge">0 votes</span></h2>
    <div id="resultsBody"></div>
  </div>

  <!-- Voter feed -->
  <div class="voters-card" style="margin-top:1.5rem">
    <h2>🧑‍🤝‍🧑 Who Has Voted</h2>
    <div class="voters-subtitle" id="votersSubtitle">No votes yet — be the first! 🎯</div>
    <div id="votersFeed"></div>
  </div>

</div>

<script>
const OPTIONS = [
  { key:'airplane', label:'Flight',     color:'#0284c7', light:'#e0f2fe', avatarBg:'#bae6fd', avatarTx:'#0c4a6e' },
  { key:'train',    label:'Train',      color:'#d97706', light:'#fffbeb', avatarBg:'#fde68a', avatarTx:'#92400e' },
  { key:'bus',      label:'Bus/Coach',  color:'#db2777', light:'#fdf2f8', avatarBg:'#fbcfe8', avatarTx:'#9d174d' },
  { key:'car',      label:'Carpool',    color:'#16a34a', light:'#f0fdf4', avatarBg:'#bbf7d0', avatarTx:'#14532d' },
  { key:'ferry',    label:'Ferry/Boat', color:'#0e7490', light:'#ecfeff', avatarBg:'#a5f3fc', avatarTx:'#164e63' },
];
const OPT_EMOJI = { airplane:'✈️', train:'🚂', bus:'🚌', car:'🚗', ferry:'⛴️' };
const STORAGE_KEY = 'tripVoteState5';
let state = { votes:[], selected:null };

// ── SVG ICONS ──
function getCardSVG(key) {

// ── BUILD CARDS ──
function buildCards(){
  const grid=document.getElementById('cardsGrid');
  grid.innerHTML='';
  OPTIONS.forEach(opt=>{
    const div=document.createElement('div');
    div.className='vote-card';
    div.dataset.option=opt.key;
    div.style.setProperty('--card-color',opt.color);
    div.innerHTML=`
      <div class="card-badge" id="badge-${opt.key}" style="background:${opt.color}">0</div>
      <div class="card-icon">${getCardSVG(opt.key)}</div>
      <div class="card-label">${opt.label}</div>`;
    div.addEventListener('click',e=>{addRipple(div,e);selectCard(opt.key)});
    div.addEventListener('mousemove',e=>tiltCard(div,e));
    div.addEventListener('mouseleave',()=>{div.style.transform=''});
    grid.appendChild(div);
  });
}
function tiltCard(card,e){
  const r=card.getBoundingClientRect();
  const x=(e.clientX-r.left)/r.width-.5;
  const y=(e.clientY-r.top)/r.height-.5;
  card.style.transform=`perspective(600px) rotateY(${x*14}deg) rotateX(${-y*14}deg) translateY(-6px) scale(1.03)`;
}
function addRipple(card,e){
  const r=card.getBoundingClientRect();
  const d=document.createElement('div');
  d.className='card-ripple';
  const size=Math.max(r.width,r.height);
  d.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
  card.appendChild(d);
  setTimeout(()=>d.remove(),600);
}

// ── SELECT CARD ──
function selectCard(key){
  state.selected=key;
  document.querySelectorAll('.vote-card').forEach(c=>c.classList.toggle('selected',c.dataset.option===key));
  const opt=OPTIONS.find(o=>o.key===key);
  document.getElementById('reasonIcon').innerHTML=getMiniSVG(key,52);
  const lbl=document.getElementById('reasonLabel');
  lbl.textContent=opt.label; lbl.style.color=opt.color;
  const inner=document.getElementById('reasonInner');
  inner.style.borderColor=opt.color;
  inner.style.boxShadow=`0 0 0 3px ${opt.color}22`;
  const ta=document.getElementById('reasonText');
  ta.style.borderColor=opt.color;
  document.getElementById('reasonWrap').classList.add('open');
  setTimeout(()=>ta.focus(),540);
}

// ── TIME HELPER ──
function timeAgo(ts){
  const diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return 'just now';
  if(diff<3600) return `${Math.floor(diff/60)}m ago`;
  if(diff<86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}
function getInitials(name){
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

// ── CAST VOTE ──
function castVote(){
  const name=document.getElementById('voterName').value.trim();
  const dept=document.getElementById('voterDept').value;
  if(!name){showToast('✏️ Please enter your name!');return}
  if(!dept){showToast('🏢 Please select your department!');return}
  if(!state.selected){showToast('👆 Please choose a transport option!');return}
  if(state.votes.find(v=>v.name.toLowerCase()===name.toLowerCase())){
    showToast(`👋 ${name} has already voted!`);return;
  }
  const reason=document.getElementById('reasonText').value.trim();
  const newVote={name,dept,option:state.selected,reason,ts:Date.now(),id:Math.random().toString(36).slice(2)};
  state.votes.unshift(newVote); // newest first
  saveState();
  renderResults();
  renderVoterFeed(newVote.id);
  updateCardCounts();
  celebrate();
  showToast(`🎉 Thanks ${name}! Vote cast for ${OPTIONS.find(o=>o.key===state.selected).label}!`);
  document.getElementById('voterName').value='';
  document.getElementById('voterDept').value='';
  document.getElementById('reasonText').value='';
  document.querySelectorAll('.vote-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('reasonWrap').classList.remove('open');
  state.selected=null;
}

// ── RESULTS ──
function renderResults(){
  const body=document.getElementById('resultsBody');
  const total=state.votes.length;
  const badge=document.getElementById('totalBadge');
  badge.textContent=`${total} vote${total!==1?'s':''}`;

  const counts={};
  OPTIONS.forEach(o=>counts[o.key]=0);
  state.votes.forEach(v=>counts[v.option]=(counts[v.option]||0)+1);
  const sorted=[...OPTIONS].sort((a,b)=>counts[b.key]-counts[a.key]);

  body.innerHTML=sorted.map(opt=>{
    const n=counts[opt.key]||0;
    const pct=total>0?Math.round(n/total*100):0;
    const comments=state.votes.filter(v=>v.option===opt.key&&v.reason);
    const uid=`cmt-${opt.key}`;
    const cmtHTML=comments.length===0?'':`
      <button class="comments-toggle" onclick="toggleComments('${uid}')">
        💬 View ${comments.length} comment${comments.length>1?'s':''} <span id="arr-${uid}">▾</span>
      </button>
      <div class="comments-panel" id="${uid}">
        <div class="comments-inner">
          ${comments.map(c=>`<div class="comment-item"><strong>${c.name}</strong> <span class="comment-dept">${c.dept}</span><br>"${c.reason}"</div>`).join('')}
        </div>
      </div>`;
    return `
      <div class="result-row">
        <div class="result-top">
          <div class="result-icon">${getMiniSVG(opt.key,30)}</div>
          <div class="result-label">${OPT_EMOJI[opt.key]} ${opt.label}</div>
          <div class="result-count">${n} vote${n!==1?'s':''} · ${pct}%</div>
        </div>
        <div class="result-bar-bg"><div class="result-bar-fill" style="width:${pct}%;background:${opt.color}"></div></div>
        ${cmtHTML}
      </div>`;
  }).join('');
}

// ── VOTER FEED ──
function renderVoterFeed(newId){
  const feed=document.getElementById('votersFeed');
  const sub=document.getElementById('votersSubtitle');
  const total=state.votes.length;

  if(total===0){
    sub.textContent='No votes yet — be the first! 🎯';
    feed.innerHTML='';
    return;
  }
  sub.textContent=`${total} team member${total>1?'s have':' has'} voted so far`;

  feed.innerHTML=state.votes.map((v,i)=>{
    const opt=OPTIONS.find(o=>o.key===v.option);
    const initials=getInitials(v.name);
    const isNew=v.id===newId;
    const reasonId=`r-${v.id||i}`;
    const reasonBtn=v.reason?`<button class="voter-reason-btn" onclick="toggleVoterReason('${reasonId}')">💬 reason</button>`:'';
    const reasonDiv=v.reason?`
      <div class="voter-reason-wrap" id="${reasonId}">
        <div class="voter-reason-inner">
          <div class="voter-reason-text">"${v.reason}"</div>
        </div>
      </div>`:'';
    return `
      <div class="voter-item ${isNew?'new-vote':''}" style="background:${opt.light};border-color:${opt.color}22">
        <div class="voter-avatar" style="background:${opt.avatarBg};color:${opt.avatarTx}">${initials}</div>
        <div class="voter-info">
          <div class="voter-name">${v.name}</div>
          <div class="voter-dept">${v.dept}</div>
          ${reasonDiv}
        </div>
        <div class="voter-choice">
          <div>${getMiniSVG(v.option,26)}</div>
          <span class="voter-choice-label" style="background:${opt.avatarBg};color:${opt.avatarTx}">${OPT_EMOJI[v.option]} ${opt.label}</span>
          ${reasonBtn}
        </div>
        <div class="voter-time">${timeAgo(v.ts)}</div>
      </div>`;
  }).join('');
}

function toggleVoterReason(id){
  document.getElementById(id)?.classList.toggle('open');
}
function toggleComments(uid){
  const panel=document.getElementById(uid);
  const arr=document.getElementById('arr-'+uid);
  panel.classList.toggle('open');
  arr.textContent=panel.classList.contains('open')?'▴':'▾';
}

// ── BADGES ──
function updateCardCounts(){
  const counts={};
  OPTIONS.forEach(o=>counts[o.key]=0);
  state.votes.forEach(v=>counts[v.option]=(counts[v.option]||0)+1);
  OPTIONS.forEach(opt=>{
    const badge=document.getElementById(`badge-${opt.key}`);
    if(badge){badge.textContent=counts[opt.key];badge.classList.remove('pop');void badge.offsetWidth;badge.classList.add('pop')}
  });
}

// ── CELEBRATE ──
function celebrate(){
  const fl=document.createElement('div');fl.className='flash-overlay';document.body.appendChild(fl);setTimeout(()=>fl.remove(),700);
  const emojis=['🎉','✨','🚀','🎊','⭐','💫','🌟'];
  for(let i=0;i<8;i++){
    setTimeout(()=>{
      const e=document.createElement('div');e.className='emoji-burst';
      e.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      e.style.left=`${20+Math.random()*60}vw`;e.style.top=`${30+Math.random()*40}vh`;
      document.body.appendChild(e);setTimeout(()=>e.remove(),1000);
    },i*90);
  }
  const canvas=document.getElementById('confettiCanvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({x:Math.random()*canvas.width,y:-20,r:Math.random()*6+3,color:`hsl(${Math.random()*360},80%,60%)`,vx:(Math.random()-.5)*4,vy:Math.random()*5+3,rot:Math.random()*360,rv:(Math.random()-.5)*6}));
  let frame=0;
  function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rv;p.vy+=.08;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);ctx.restore()});frame++;if(frame<120)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);}
  draw();
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);
}

// ── STORAGE ──
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify({votes:state.votes}))}
function loadState(){
  try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY));if(s&&s.votes)state.votes=s.votes;}catch(e){}
}

// ── FLOATERS ──
function spawnFloaters(){
  const bg=document.querySelector('.bg-layer');
  const items=['✈️','🚂','🚌','🚗','⛴️','🗺️','🌍','🎒','🏖️','🌴','⭐','💫'];
  for(let i=0;i<14;i++){
    const el=document.createElement('div');el.className='float-emoji';
    el.textContent=items[i%items.length];
    el.style.left=`${Math.random()*95}vw`;
    el.style.animationDelay=`${Math.random()*14}s`;
    el.style.animationDuration=`${12+Math.random()*10}s`;
    bg.appendChild(el);
  }
}

// ── INIT ──
loadState();
buildCards();
updateCardCounts();
renderResults();
renderVoterFeed(null);
spawnFloaters();

// refresh time labels every minute
setInterval(()=>renderVoterFeed(null),60000);
</script>
</body>
</html>
